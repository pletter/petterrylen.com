<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">
    <title>PIANO COURSE</title>
    <style>
        * {
            touch-action: manipulation;
        }

        body {
            font-family: 'josefin sans', Courier, monospace, sans-serif;
            margin: 4vw;
        }


        #site {
            display: flex;
        }

        .content {
            width: 600px;
            margin: 0 auto;
        }

        #title {
            font-size: 1.6em;
            margin-bottom: 20px;
        }

        h2 {
            color: white;
            background-color: black;
            font-size: 200%;
            text-align: center;
            padding: 30px 0px 25px;
        }

        #videoContainer {
            margin-bottom: 30px;
        }

        #textContainer {
            display: none;
        }

        .chapterDescription {
            font-size: 50%;
            margin: 5px 0px 0px 3px;
            font-style: italic;
            text-transform: lowercase;
        }

        #leftmenu .chapterlink {
            font-size: 190%;
            text-align: left;
            text-transform: lowercase;
        }

        .videolink {
            margin-left: 10px;
            transition: 0.1s;
        }

        .videolink:hover {
            margin-left: 5px;
            transition: 0.1s;
        }

        #leftmenu {
            min-width: 300px;
            margin: 0px 40px 0px 0px;
        }

        #leftmenu button {
            font-family: josefin sans;
            display: grid;
            margin-bottom: 15px;
        }

        #leftmenu button {
            border: 1px solid black;
            background-color: rgb(247, 247, 247);
            font-size: 1em;
            padding: 9px 9px 7px;
        }

        #backBtn {
            font-size: 1em;
            display: none;
        }

        #backBtn,
        #nextBtn {
            font-size: 1.1em;
            background-color: white;
            border: 1px solid black;
            font-family: josefin sans;
            padding: 9px 12px 7px;
        }

        #leftmenu button.hiddenChapter {
            display: none;
        }

        #leftmenu button.selectedChapter {
            background-color: hsl(185, 46%, 66%);
        }

        #leftmenu button.selected {
            background-color: hsl(39, 85%, 69%);
            margin-left: ;
        }

        #leftmenu button.selected:hover {
            background-color: hsl(39, 85%, 69%);
        }

        .invisible {
            visibility: hidden;
        }

        button {
            border-radius: 6px;
            box-shadow: 1px 3px black;
        }

        #nextBtn:hover,
        #backBtn:hover,
        #leftmenu button:hover {
            background-color: hsl(112, 50%, 82%);
        }

        .circle {
            border: 1.5px solid black;
            padding: 4px 4px;
            border-radius: 50%;
            width: 4px;
            height: 4px;
            margin-bottom: 15px;
        }

        .selectedcircle {
            background-color: hsl(128, 44%, 64%);
        }

        .menuitemcontainer {
            display: flex;
            align-items: center;
        }

        @media only screen and (max-width: 800px) {

            header h2 {
                font-size: 1em;
                padding: 7px 7px 5px;
                text-align: left;
                display: inline-block;
                margin: -5px 0px 20px -5px;
                font-weight: 700;
            }

            #site {
                flex-direction: column-reverse;
            }

            .content {
                width: 90vw;
                margin: 0px auto 37px;
                text-align: center;
            }

            #title {
                font-size: 1.2em;
                margin-bottom: 20px;
            }

            #leftmenu {
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            button {
                color: black;
            }

            #leftmenu button {
                width: 70vw;
                text-align: center;
                padding: 15px 0px 13px;
            }

            #leftmenu .chapterlink {
                font-size: 190%;
                width: 80vw;
            }

            #leftmenu button:hover {
                background-color: hsl(185, 46%, 66%);
            }

            #videoContainer {
                margin-bottom: 15px;
            }
        }
    </style>
    <script src="json.js"></script>
</head>

<body>
    <div>

    </div>

    <header>
        <h2>Piano for producers</h2>
    </header>
    <div id="site">
        <div id="leftmenu"></div>

        <div class="content">
            <h1 id="title">1. The major circle</h1>
            <div>
                <span id="textContainer"></span>
            </div>
            <div id="videoContainer" style="aspect-ratio: 16/9; width: 100%;">
                <iframe width="100%" style="aspect-ratio: 16/9;" src="https://www.youtube.com/embed/WkS72UAMq8Y"
                    title="YouTube video player" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen></iframe>
            </div>

            <div style="display: grid; grid-template-columns: auto auto;">
                <div>
                    <button onclick="previousVideo();" id="backBtn">back</button>
                </div>
                <div>
                    <button style="float: right;" onclick="nextVideo();" id="nextBtn">continue to next lesson</button>
                </div>
            </div>
        </div>
    </div>


    <script>

        function gotoVideo(chapterIndex, videoIndex) {
            // make sure these are integers
            chapterIndex = parseInt(chapterIndex)
            videoIndex = parseInt(videoIndex)

            document.getElementById('videoContainer').innerHTML = '<iframe width="100%" style="aspect-ratio: 16/9;" src="https://www.youtube.com/embed/'
                + allChapters[chapterIndex].videos[videoIndex].videoId +
                '" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>';


            /* Set title */
            document.getElementById('title').innerHTML = (videoIndex + 1) + ".&nbsp;" + allChapters[chapterIndex].videos[videoIndex].title
            /* Set text */
            document.getElementById('textContainer').innerHTML = allChapters[chapterIndex].videos[videoIndex].description




            let isFirstVideo = videoIndex === 0
            let isFirstChapter = chapterIndex === 0
            if (isFirstVideo && isFirstChapter) {
                document.getElementById('backBtn').classList.add('invisible')
            }
            else {
                document.getElementById('backBtn').classList.remove('invisible')
            }

            let isLastVideo = videoIndex === allChapters[chapterIndex].videos.length - 1
            if (isLastVideo) {
                document.getElementById('nextBtn').innerHTML = "Continue to next chapter"
            }
            else {
                document.getElementById('nextBtn').innerHTML = "Continue to next lesson"
            }
            let isLastChapter = chapterIndex === allChapters.length - 1
            if (isLastVideo && isLastChapter) {
                document.getElementById('nextBtn').classList.add('invisible')
            }

            else {
                document.getElementById('nextBtn').classList.remove('invisible')
            }

            /* update progression and save in localStorage */
            currentChapterIndex = chapterIndex
            currentVideoIndex = videoIndex
            localStorage.setItem("currentChapterIndex", currentChapterIndex);
            localStorage.setItem("currentVideoIndex", currentVideoIndex);


            /* change menu */
            let allBtn = document.getElementById('leftmenu').getElementsByTagName('button')
            for (let i = 0; i < allBtn.length; i++) {
                if (allBtn[i].id === "chapter" + chapterIndex + "menu" + videoIndex) {
                    allBtn[i].classList.add("selected")
                    allBtn[i].classList.remove("hiddenChapter")
                    document.getElementById('chapter' + chapterIndex + 'menucircle' + videoIndex).classList.add("selectedcircle")

                }
                else if (parseInt(allBtn[i].id.slice(7)) !== currentChapterIndex && allBtn[i].id.length > 9) {
                    allBtn[i].classList.add("hiddenChapter")

                }
                else if (allBtn[i].id === "chapter" + chapterIndex) {
                    allBtn[i].classList.add("selectedChapter")
                }

                else {
                    allBtn[i].classList.remove("selected")
                    allBtn[i].classList.remove("selectedChapter")
                    allBtn[i].classList.remove("hiddenChapter")
                }
            }

        };
        function previousVideo() {
            if (currentVideoIndex === 0) {
                currentVideoIndex = allChapters[currentChapterIndex - 1].videos.length - 1;
                currentChapterIndex -= 1
            }
            else {
                currentVideoIndex = currentVideoIndex - 1
            }
            gotoVideo(currentChapterIndex, currentVideoIndex);
        }

        function nextVideo() {
            if (currentVideoIndex === allChapters[currentChapterIndex].videos.length - 1) {
                currentVideoIndex = 0
                currentChapterIndex += 1
            }
            else {
                currentVideoIndex += 1
            }
            gotoVideo(currentChapterIndex, currentVideoIndex);
        }

        function addMenu() {
            let startChapter = 0;
            for (let chapterIndex = 0; chapterIndex < allChapters.length; chapterIndex += 1) {
                let chapter = allChapters[chapterIndex];
                document.getElementById('leftmenu').innerHTML += '<button class="chapterlink" id="chapter' + chapterIndex + '" onclick="gotoVideo(' + chapterIndex + ', 0)">' + chapter.title + "&nbsp;" + '<span class="chapterDescription">' + chapter.description + '</span></button>';
                for (let videoIndex = 0; videoIndex < chapter.videos.length; videoIndex += 1) {
                    document.getElementById('leftmenu').innerHTML += '<button id="chapter' + chapterIndex + 'menu' + videoIndex + '" class="videolink" onclick="gotoVideo(' + chapterIndex + ',' + videoIndex + ')">' + (videoIndex + 1) + ".&nbsp;" + allChapters[chapterIndex].videos[videoIndex].title + '</button>';

                }

            }

        }

        function getFromLocalStorage(key, defaultValue) {
            let value = localStorage.getItem(key)
            if (value === null) {
                value = defaultValue;
            }
            return value;
        }


        let currentChapterIndex = parseInt(getFromLocalStorage("currentChapterIndex", 0));
        let currentVideoIndex = parseInt(getFromLocalStorage("currentVideoIndex", 0));

        addMenu()
        gotoVideo(currentChapterIndex, currentVideoIndex)



        /* Listen for keys */
        document.addEventListener("keydown", function (event) {
            if (event.keyCode === 37) {
                // Left arrow key pressed
                previousVideo()
            } else if (event.keyCode === 39) {
                // Right arrow key pressed
                nextVideo()
            }
        });
    </script>

</body>

</html>
