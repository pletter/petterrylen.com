<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spegelspegel</title>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Josefin Sans', sans-serif;
            background: #07080f;
            color: #e5e5e5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-size: 180px 180px;
            opacity: 0.045;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -30vh;
            left: 50%;
            transform: translateX(-50%);
            width: 70vw;
            height: 70vw;
            max-width: 700px;
            max-height: 700px;
            background: radial-gradient(circle, rgba(200, 210, 255, 0.12) 0%, rgba(100, 120, 200, 0.06) 40%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: moonDrift 20s ease-in-out infinite alternate;
        }

        @keyframes moonDrift {
            0% {
                transform: translateX(-50%) translateY(0);
                opacity: 0.8;
            }

            100% {
                transform: translateX(-50%) translateY(6vh);
                opacity: 1;
            }
        }

        .phones {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .phone {
            position: absolute;
            border-radius: 18px;
            animation: hover var(--dur, 8s) ease-in-out infinite alternate;
            animation-delay: var(--delay, 0s);
            opacity: var(--base-opacity, 0.35);
        }

        @keyframes hover {
            0% {
                transform: translateY(0px) rotate(var(--rot-a));
            }

            100% {
                transform: translateY(var(--drift, -28px)) rotate(var(--rot-b));
            }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2.5rem 1.5rem 4rem;
        }

        /* Player */
        .player {
            width: 100%;
            max-width: 420px;
            margin-bottom: 3rem;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 14px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: #e5e5e5;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.3rem;
            font-family: inherit;
            font-style: normal;
            -webkit-font-smoothing: antialiased;
            border-radius: 50%;
            padding-bottom: 3px;
            backdrop-filter: blur(6px);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.13);
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            min-width: 32px;
            letter-spacing: 0.05em;
        }

        .progress-bar {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            cursor: pointer;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: rgba(200, 215, 255, 0.6);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        /* Lyrics */
        .lyrics-container {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .lyric-line {
            font-size: 1.35rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.2);
            line-height: 1.5;
            text-align: center;
            transition: color 0.35s ease;
            padding: 0.2rem 0;
            cursor: pointer;
            letter-spacing: 0.03em;
        }

        .lyric-line.active {
            color: #fff;
        }

        .lyric-line.passed {
            color: rgba(255, 255, 255, 0.28);
        }

        .lyric-line.upcoming {
            color: rgba(255, 255, 255, 0.18);
        }

        .lyric-line.empty {
            height: 1.2rem;
        }

        @media (max-width: 600px) {
            .lyric-line {
                font-size: 1.15rem;
            }

            .player {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="phones" id="phones"></div>

    <div class="container">
        <div class="player">
            <audio id="audioPlayer"></audio>

            <div class="controls-row">
                <button class="control-btn" id="playPauseBtn">
                    <svg id="playIcon" width="18" height="18" viewBox="0 0 18 18" fill="currentColor"
                        style="margin-left:3px;margin-bottom:-3px">
                        <polygon points="3,1 17,9 3,17" />
                    </svg>
                    <svg id="pauseIcon" width="18" height="18" viewBox="0 0 18 18" fill="currentColor"
                        style="display:none;margin-bottom:-3px">
                        <rect x="2" y="1" width="5" height="16" rx="1" />
                        <rect x="11" y="1" width="5" height="16" rx="1" />
                    </svg>
                </button>
            </div>

            <div class="progress-container">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time" id="totalTime">0:00</span>
            </div>
        </div>

        <div class="lyrics-container" id="lyricsContainer"></div>
    </div>

    <script>
        // Phones
        const phonesEl = document.getElementById('phones');
        const phoneColors = ['#ff6600', '#00ff88', '#ff00aa', '#00ccff', '#ffee00', '#cc00ff', '#ff2222', '#ffffff'];
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'phone';
            const w = 38 + Math.random() * 30;
            const h = w * (1.9 + Math.random() * 0.4);
            const color = phoneColors[Math.floor(Math.random() * phoneColors.length)];
            const rotA = (Math.random() * 40 - 20).toFixed(1);
            const rotB = (parseFloat(rotA) + (Math.random() * 10 - 5)).toFixed(1);
            const drift = -(18 + Math.random() * 24).toFixed(0);
            p.style.cssText = `
                width: ${w}px; height: ${h}px;
                top: ${Math.random() * 100}%;
                left: ${Math.random() * 100}%;
                background: ${color};
                --dur: ${6 + Math.random() * 8}s;
                --delay: ${Math.random() * 8}s;
                --base-opacity: ${0.25 + Math.random() * 0.45};
                --rot-a: ${rotA}deg;
                --rot-b: ${rotB}deg;
                --drift: ${drift}px;
            `;
            phonesEl.appendChild(p);
        }

        // Lyrics data
        const lyricsData = [
            { time: 2, text: "Tittar på min fån" },
            { time: 7.502384830013115, text: "Den ser tillbak på mig" },
            { time: 12.327652413657875, text: "Säger du är ful" },
            { time: 16.92510699634539, text: "Jag säger spegel" },
            { time: 25.082345372320116, text: "" },
            { time: 26.234612912652846, text: "Jag pallar inte prata" },
            { time: 27.626741829988454, text: "Jag orkar inte le" },
            { time: 33.01443582999047, text: "Jag vill skruva upp musiken" },
            { time: 39.03364962132204, text: "Tills ingen fattar vad som hänt" },
            { time: 42.89337695499646, text: "" },
            { time: 44.01680616365989, text: "Alla bara stirrar" },
            { time: 47.80657799668712, text: "Är du dum i huvudet" },
            { time: 52.060984663656996, text: "Nu kan vi inte höra tvivlen" },
            { time: 55.184985204349665, text: "Som kör repeat i våra pannor" },
            { time: 60.5370083713326, text: "" },
            { time: 61.7073974136576, text: "Tittar på min fån" },
            { time: 66.79534620467314, text: "Den ser tillbak på mig" },
            { time: 71.89313082934835, text: "Säger du är ful" },
            { time: 77.24923132966698, text: "Jag säger spegel" },
            { time: 80.89027941299773, text: "" },
            { time: 84.52557328833677, text: "Jag är trött på prat om pengar" },
            { time: 87.780785996673, text: "Och alla smarta drag" },
            { time: 93.76694103864492, text: "Jag vill elda upp ett badrum" },
            { time: 96.90159849633689, text: "Vandalisera en kakelugnsklenod" },
            { time: 102.58039383000013, text: "" },
            { time: 103.3462724973385, text: "Jag har så många lån" },
            { time: 106.70554424598433, text: "Lånar ut mig själv till" },
            { time: 108.9955482883463, text: "Vem som helst som frågar" },
            { time: 111.83845932968319, text: "Och jag glömmer skriva papper" },
            { time: 116.0508495793113, text: "Är för snäll för be om ränta" },
            { time: 119.64786624766064, text: "" },
            { time: 123.59253716265812, text: "Tittar på min fån" },
            { time: 128.40687182966533, text: "Den ser tillbak på mig" },
            { time: 131.92947353898253, text: "Säger du är ful" },
            { time: 137.66562770466524, text: "Jag säger spegel spegel" }
        ];

        // Player
        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeDisplay = document.getElementById('currentTime');
        const totalTimeDisplay = document.getElementById('totalTime');
        const lyricsContainer = document.getElementById('lyricsContainer');

        let isPlaying = false;
        let lyricElements = [];
        let userIsScrolling = false;
        let scrollTimeout;
        let lastActiveIndex = -1;

        audioPlayer.src = 'spegelspegel.mp3';

        function togglePlayPause() {
            if (isPlaying) {
                audioPlayer.pause();
                playIcon.style.display = '';
                pauseIcon.style.display = 'none';
                isPlaying = false;
            } else {
                audioPlayer.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = '';
                isPlaying = true;
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateProgress() {
            if (audioPlayer.duration) {
                const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressFill.style.width = progress + '%';
                currentTimeDisplay.textContent = formatTime(audioPlayer.currentTime);
                totalTimeDisplay.textContent = formatTime(audioPlayer.duration);
            }
            updateActiveLyric();
        }

        progressBar.addEventListener('click', (e) => {
            if (audioPlayer.duration) {
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                lastActiveIndex = -1;
                audioPlayer.currentTime = percent * audioPlayer.duration;
            }
        });

        playPauseBtn.addEventListener('click', togglePlayPause);
        audioPlayer.addEventListener('timeupdate', updateProgress);
        audioPlayer.addEventListener('loadedmetadata', () => {
            totalTimeDisplay.textContent = formatTime(audioPlayer.duration);
        });
        audioPlayer.addEventListener('ended', () => {
            isPlaying = false;
            playIcon.style.display = '';
            pauseIcon.style.display = 'none';
            audioPlayer.currentTime = 0;
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlayPause();
            }
        });

        window.addEventListener('scroll', () => {
            userIsScrolling = true;
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => { userIsScrolling = false; }, 3000);
        });

        // Render lyrics
        lyricsData.forEach((line) => {
            const el = document.createElement('div');
            el.className = 'lyric-line' + (line.text === '' ? ' empty' : '');
            el.textContent = line.text;
            el.addEventListener('click', () => { audioPlayer.currentTime = line.time; });
            lyricsContainer.appendChild(el);
            lyricElements.push(el);
        });

        function updateActiveLyric() {
            const currentTime = audioPlayer.currentTime;
            let activeIndex = -1;

            for (let i = lyricsData.length - 1; i >= 0; i--) {
                if (currentTime >= lyricsData[i].time) {
                    activeIndex = i;
                    break;
                }
            }

            if (activeIndex === lastActiveIndex) return;
            lastActiveIndex = activeIndex;

            lyricElements.forEach((el, index) => {
                el.classList.remove('active', 'passed', 'upcoming');
                if (index === activeIndex) el.classList.add('active');
                else if (index < activeIndex) el.classList.add('passed');
                else el.classList.add('upcoming');
            });

            if (!userIsScrolling && activeIndex >= 0 && lyricElements[activeIndex]) {
                lyricElements[activeIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>

</html>
